<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #000; color: #fff; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 25px 0; }
        header h1 { font-size: 24px; color: #007AFF; font-weight: 800; }
        .search-container { margin-bottom: 25px; position: sticky; top: 15px; z-index: 10; }
        input { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #222; background: #111; color: #fff; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #0a0a0a; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.03); border-color: #007AFF; }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-info { padding: 12px; font-size: 12px; text-align: center; font-weight: 600; }
        .badge { background: #ff0000; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>HM MODZ STREAM <span style="color:#fff">MUSE</span></h1></header>

    <div class="search-container">
        <input type="text" id="search" placeholder="Cari anime Muse (Frieren, Wind Breaker)...">
    </div>

    <div class="anime-grid" id="grid"></div>
</div>

<script>
    const grid = document.getElementById('grid');

    async function searchAnime(q = '') {
        try {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&limit=20`);
            const json = await res.json();
            draw(json.data);
        } catch (e) {}
    }

    function draw(list) {
        grid.innerHTML = list.map(a => `
            <div class="card" onclick="goToMuse('${a.title}')">
                <img src="${a.images.jpg.image_url}">
                <div class="card-info">
                    <span class="badge">OPEN IN YOUTUBE</span><br>
                    ${a.title}
                </div>
            </div>
        `).join('');
    }

    function goToMuse(title) {
        const query = encodeURIComponent(title + " Muse Indonesia");
        window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
    }

    let t;
    document.getElementById('search').oninput = (e) => {
        clearTimeout(t);
        t = setTimeout(() => searchAnime(e.target.value), 800);
    };

    searchAnime('Trend');
</script>
</body>
</html>
