<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM STREAM | BYPASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #10b981; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: scale(1.02); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-genre { white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; font-size: 10px; }
        .btn-genre.active { background: var(--main); color: black; border-color: var(--main); font-weight: bold; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
        .loader-icon { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--main); border-radius: 50%; width: 25px; height: 25px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <nav class="glass sticky top-0 px-6 py-4 flex flex-col gap-4 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black italic">HM <span class="text-[#10b981]">STREAM</span></h1>
            <div id="status" class="text-[8px] font-bold text-gray-400 uppercase px-3 py-1 bg-white/5 rounded-full">Secure</div>
        </div>
        <div class="relative">
            <input type="text" id="query" placeholder="Cari anime..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:border-[#10b981] outline-none">
        </div>
        <div id="genre-container" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <button onclick="setGenre('', this)" class="btn-genre active px-4 py-1.5 rounded-full uppercase">Recent</button>
            <button onclick="setGenre('action', this)" class="btn-genre px-4 py-1.5 rounded-full uppercase">Action</button>
            <button onclick="setGenre('adventure', this)" class="btn-genre px-4 py-1.5 rounded-full uppercase">Adventure</button>
            <button onclick="setGenre('comedy', this)" class="btn-genre px-4 py-1.5 rounded-full uppercase">Comedy</button>
            <button onclick="setGenre('romance', this)" class="btn-genre px-4 py-1.5 rounded-full uppercase">Romance</button>
        </div>
    </nav>

    <main class="p-4 max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div id="pagination" class="flex justify-center mt-10 hidden">
            <button onclick="more()" class="bg-white/5 border border-white/10 px-10 py-3 rounded-xl text-xs font-bold uppercase hover:bg-white/10 transition-all">Next Page</button>
        </div>
        <div id="loader" class="flex justify-center py-20"><div class="loader-icon"></div></div>
    </main>

    <div id="modal" class="fixed inset-0 hidden z-[99] bg-black flex items-center justify-center p-4">
        <div class="w-full max-w-4xl relative">
            <button onclick="closePlayer()" class="absolute -top-10 right-0 text-white/50 text-[10px] uppercase">Close</button>
            <div id="video-box" class="bg-black rounded-xl overflow-hidden shadow-2xl border border-white/5"></div>
        </div>
    </div>

    <script>
        const ENDPOINTS = [
            "https://consumet-api-production-e852.up.railway.app/anime/gogoanime",
            "https://api.consumet.org/anime/gogoanime",
            "https://api-amvstrm.c99.workers.dev/anime/gogoanime"
        ];
        const PROXY = "https://api.allorigins.win/raw?url=";
        
        let page = 1;
        let genre = '';
        let searching = false;

        async function fetchSmart(path) {
            for (let base of ENDPOINTS) {
                try {
                    const r = await fetch(base + path);
                    if (r.ok) return await r.json();
                } catch {
                    try {
                        const pr = await fetch(PROXY + encodeURIComponent(base + path));
                        if (pr.ok) return await pr.json();
                    } catch { continue; }
                }
            }
            throw 1;
        }

        async function sync(reset = false) {
            if (reset) { page = 1; document.getElementById('grid').innerHTML = ''; }
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('status').innerText = "Syncing...";
            
            try {
                let p = searching ? `/${document.getElementById('query').value}?page=${page}` : 
                        (genre ? `/genre/${genre}?page=${page}` : `/recent-releases?page=${page}`);
                const res = await fetchSmart(p);
                const data = res.results || [];
                if (data.length) {
                    draw(data);
                    document.getElementById('pagination').classList.remove('hidden');
                    document.getElementById('status').innerText = "Ready";
                }
            } catch {
                document.getElementById('status').innerText = "Offline";
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function draw(items) {
            const g = document.getElementById('grid');
            items.forEach(i => {
                const d = document.createElement('div');
                d.className = 'card cursor-pointer';
                d.onclick = () => play(i.episodeId || i.id);
                d.innerHTML = `
                    <img src="${i.image}" class="aspect-[3/4] object-cover w-full bg-zinc-900" onerror="this.src='https://placehold.co/300x400/111/10b981?text=No+Image'">
                    <div class="p-2 text-[10px] font-bold truncate uppercase">${i.title}</div>
                `;
                g.appendChild(d);
            });
        }

        function setGenre(gn, b) {
            genre = gn; searching = false;
            document.querySelectorAll('.btn-genre').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            sync(true);
        }

        function more() { page++; sync(); }

        async function play(id) {
            const m = document.getElementById('modal');
            const v = document.getElementById('video-box');
            m.classList.remove('hidden');
            v.innerHTML = `<div class="aspect-video flex items-center justify-center text-[10px] animate-pulse">CONNECTING...</div>`;
            try {
                const d = await fetchSmart(`/watch/${id}`);
                const s = d.headers?.Referer || d.sources[0].url;
                v.innerHTML = `<iframe src="${s}" allowfullscreen></iframe>`;
            } catch { v.innerHTML = `<div class="p-10 text-center">FAILED</div>`; }
        }

        function closePlayer() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('video-box').innerHTML = '';
        }

        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { searching = true; genre = ''; sync(true); }
        });

        window.onload = () => sync();
    </script>
</body>
</html>
