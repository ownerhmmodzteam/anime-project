<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V3</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(180deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 40px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
        }

        #player-section {
            display: none;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 15px;
            border: none;
        }

        #anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-info {
            padding: 12px;
        }

        .card-info h3 {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HM MODZ Stream</h1>
    </header>

    <div id="player-section">
        <button class="btn-close" onclick="closePlayer()">✕ Tutup Player</button>
        <h2 id="playing-title" style="margin-bottom: 15px; font-size: 1rem; color: #aaa;"></h2>
        <iframe id="video-player" src="" allowfullscreen></iframe>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="Cari anime apa hari ini, Tuan?">
    </div>

    <div id="anime-grid"></div>
</div>

<script>
    const grid = document.getElementById('anime-grid');
    const searchInput = document.getElementById('search');
    const playerSection = document.getElementById('player-section');
    const videoPlayer = document.getElementById('video-player');
    const playingTitle = document.getElementById('playing-title');

    async function getAnime(query = '') {
        grid.innerHTML = '<div class="loading">Sabar ya Tuan, lagi nyari...</div>';
        const url = query 
            ? `https://api.jikan.moe/v4/anime?q=${query}&limit=24` 
            : `https://api.jikan.moe/v4/top/anime?limit=24`;

        try {
            const res = await fetch(url);
            const json = await res.json();
            render(json.data);
        } catch (e) {
            grid.innerHTML = '<div class="loading">Gagal koneksi ke server.</div>';
        }
    }

    function render(list) {
        grid.innerHTML = '';
        if (!list || list.length === 0) {
            grid.innerHTML = '<div class="loading">Kosong, Tuan. Coba judul lain.</div>';
            return;
        }

        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${item.images.webp.large_image_url}">
                <div class="card-info">
                    <h3>${item.title}</h3>
                </div>
            `;
            div.onclick = () => playAnime(item.title, item.mal_id);
            grid.appendChild(div);
        });
    }

    function playAnime(title, id) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        playerSection.style.display = 'block';
        playingTitle.innerText = `Menonton: ${title}`;
        
        videoPlayer.src = `https://www.bread-m.my.id/embed/mal/${id}`;
    }

    function closePlayer() {
        playerSection.style.display = 'none';
        videoPlayer.src = '';
    }

    let timer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => getAnime(e.target.value), 700);
    });

    getAnime();
</script>

</body>
</html>
