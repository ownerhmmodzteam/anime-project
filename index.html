<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V21 - BYPASS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #000; color: #fff; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 25px 0; }
        header h1 { font-size: 26px; color: #007AFF; font-weight: 900; }
        .search-area { margin-bottom: 25px; position: sticky; top: 10px; z-index: 100; }
        input { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        #player-view { display: none; margin-bottom: 30px; background: #050505; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border-radius: 18px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #007AFF; }
        .card img { width: 100%; height: 215px; object-fit: cover; }
        .card-info { padding: 12px; font-size: 13px; text-align: center; font-weight: bold; }
        .status { color: #ff0000; font-size: 10px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>HM MODZ <span style="color:#fff">MUSE</span></h1></header>

    <div id="player-view">
        <div style="padding: 12px; display: flex; justify-content: space-between; font-size: 12px; color: #888;">
            <span id="p-title">Ready to Stream...</span>
            <span style="color: #ff5f57; cursor: pointer; font-weight: bold;" onclick="closePlayer()">CLOSE ✕</span>
        </div>
        <div class="video-box">
            <iframe id="p-frame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="search" placeholder="Cari anime Muse Indonesia, Tuan...">
    </div>

    <div class="grid" id="anime-list"></div>
</div>

<script>
    const grid = document.getElementById('anime-list');
    const player = document.getElementById('player-view');
    const frame = document.getElementById('p-frame');
    const title = document.getElementById('p-title');

    async function getAnimes(q = '') {
        const api = q ? `https://api.jikan.moe/v4/anime?q=${q}&limit=20` : `https://api.jikan.moe/v4/top/anime?limit=20`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            render(data.data);
        } catch (e) {}
    }

    function render(list) {
        grid.innerHTML = list.map(a => `
            <div class="card" onclick="forcePlay('${a.title}')">
                <img src="${a.images.jpg.image_url}">
                <div class="card-info">
                    <span class="status">LIVE ON MUSE ID</span>
                    ${a.title}
                </div>
            </div>
        `).join('');
    }

    function forcePlay(animeTitle) {
        player.style.display = 'block';
        title.innerText = "Searching Muse: " + animeTitle;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        const searchQuery = encodeURIComponent(animeTitle + " Muse Indonesia");
        
        // bypass total: gunakan search list langsung ke YouTube embed
        frame.src = `https://www.youtube.com/embed?listType=search&list=${searchQuery}&autoplay=1`;
    }

    function closePlayer() {
        player.style.display = 'none';
        frame.src = '';
    }

    let timer;
    document.getElementById('search').oninput = (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => getAnimes(e.target.value), 800);
    };

    getAnimes();
</script>
</body>
</html>
