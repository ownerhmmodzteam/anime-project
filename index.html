<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ - Anime Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #anime-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .anime-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .anime-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
        }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-info {
            padding: 12px;
        }

        .anime-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-info p {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HM MODZ Anime</h1>
    </header>

    <div class="search-box">
        <input type="text" id="search" placeholder="Cari anime, Tuan...">
    </div>

    <div id="anime-list"></div>
</div>

<script>
    const animeList = document.getElementById('anime-list');
    const searchInput = document.getElementById('search');

    async function fetchAnime(query = '') {
        animeList.innerHTML = '<div class="loading">Memuat data...</div>';
        try {
            const url = query 
                ? `https://api.jikan.moe/v4/anime?q=${query}&limit=20` 
                : 'https://api.jikan.moe/v4/top/anime?limit=20';
            
            const response = await fetch(url);
            const data = await response.json();
            displayAnime(data.data);
        } catch (error) {
            animeList.innerHTML = '<div class="loading">Gagal ambil data. Cek koneksi, Tuan.</div>';
        }
    }

    function displayAnime(animes) {
        animeList.innerHTML = '';
        if (!animes || animes.length === 0) {
            animeList.innerHTML = '<div class="loading">Gak nemu apa-apa.</div>';
            return;
        }

        animes.forEach(anime => {
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.innerHTML = `
                <img src="${anime.images.webp.large_image_url}" alt="${anime.title}">
                <div class="anime-info">
                    <h3>${anime.title}</h3>
                    <p>${anime.type} • ${anime.score || 'N/A'}</p>
                </div>
            `;
            card.onclick = () => window.open(anime.url, '_blank');
            animeList.appendChild(card);
        });
    }

    let timeout = null;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            fetchAnime(e.target.value);
        }, 800);
    });

    fetchAnime();
</script>

</body>
</html>
