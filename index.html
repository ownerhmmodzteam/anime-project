<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V11</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }
        body { background: #000; color: #fff; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header h1 { text-align: center; font-size: 1.8rem; margin: 20px 0; background: linear-gradient(180deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.07); color: #fff; outline: none; margin-bottom: 20px; }
        #player-section { display: none; margin-bottom: 30px; background: #0a0a0a; border-radius: 20px; padding: 10px; border: 1px solid #1a1a1a; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .server-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .btn-s { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-s.active { background: #fff; color: #000; border-color: #fff; }
        .ep-container { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        #anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #0f0f0f; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 10px; font-size: 0.8rem; text-align: center; }
        .player-head { display: flex; justify-content: space-between; padding: 5px 10px 10px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>HM MODZ Stream</h1></header>

    <div id="player-section">
        <div class="player-head">
            <span id="playing-title" style="color: #888;"></span>
            <span style="color: #ff5f57; cursor: pointer; font-weight: 600;" onclick="closePlayer()">TUTUP X</span>
        </div>
        <div class="video-wrapper">
            <iframe id="video-player" src="" allowfullscreen></iframe>
        </div>
        <div class="ep-container">
            <span style="font-size: 12px;">Episode:</span>
            <input type="number" id="ep-num" value="1" min="1" style="width: 60px; margin: 0; padding: 5px 10px;">
        </div>
        <div class="server-grid" id="server-list"></div>
    </div>

    <input type="text" id="search" placeholder="Cari judul anime, Tuan...">
    <div id="anime-grid"></div>
</div>

<script>
    const grid = document.getElementById('anime-grid');
    const searchInput = document.getElementById('search');
    const playerSection = document.getElementById('player-section');
    const videoPlayer = document.getElementById('video-player');
    const playingTitle = document.getElementById('playing-title');
    const serverList = document.getElementById('server-list');
    const epInput = document.getElementById('ep-num');
    let currentId = '';

    async function getAnime(query = '') {
        const url = query ? `https://api.jikan.moe/v4/anime?q=${query}&limit=20` : `https://api.jikan.moe/v4/top/anime?limit=20`;
        const res = await fetch(url);
        const json = await res.json();
        render(json.data);
    }

    function render(list) {
        grid.innerHTML = '';
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${item.images.webp.large_image_url}"><div class="card-info"><h3>${item.title}</h3></div>`;
            div.onclick = () => playAnime(item.title, item.mal_id);
            grid.appendChild(div);
        });
    }

    function playAnime(title, id) {
        currentId = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        playerSection.style.display = 'block';
        playingTitle.innerText = `Nonton: ${title}`;
        setupServers();
    }

    function setupServers() {
        const ep = epInput.value;
        const servers = [
            { name: 'S-Lokal', url: `https://www.slow-m.my.id/embed/mal/${currentId}/${ep}` },
            { name: 'S-Stream', url: `https://www.bread-m.my.id/embed/mal/${currentId}/${ep}` },
            { name: 'Server 1', url: `https://vidsrc.to/embed/anime/${currentId}/${ep}` },
            { name: 'Server 2', url: `https://vidsrc.me/embed/anime?mal=${currentId}&ep=${ep}` },
            { name: 'Server 3', url: `https://vidsrc.xyz/embed/anime?mal=${currentId}&ep=${ep}` },
            { name: 'Server 4', url: `https://anime.vidsrc.pro/embed/anime/${currentId}?episode=${ep}` },
            { name: 'Alt-1', url: `https://2embed.cc/embed/anime?mal=${currentId}&ep=${ep}` }
        ];

        serverList.innerHTML = '';
        servers.forEach((s, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-s' + (i === 0 ? ' active' : '');
            btn.innerText = s.name;
            btn.onclick = () => {
                document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                videoPlayer.src = s.url;
            };
            serverList.appendChild(btn);
        });
        videoPlayer.src = servers[0].url;
    }

    epInput.onchange = setupServers;

    function closePlayer() {
        playerSection.style.display = 'none';
        videoPlayer.src = '';
    }

    let timer;
    searchInput.oninput = (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => getAnime(e.target.value), 700);
    };

    getAnime();
</script>
</body>
</html>
