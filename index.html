<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WatchNime • Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="brand-container">
            <h1 class="logo-text">Watch<span>Nime</span></h1>
            <div class="logo-sub">Official Developer</div>
        </div>
        <div class="user-avatar" onclick="goProfile()">
            <img src="https://e.top4top.io/p_369675i750.png">
        </div>
    </header>

    <div id="search-overlay" class="search-overlay hidden">
        <div class="search-content">
            <div class="search-box-container">
                <input type="text" id="searchInput" placeholder="Cari anime...">
                <button onclick="handleSearch()" class="search-confirm-btn">🔍</button>
            </div>
            <button onclick="toggleSearch()" class="close-search-btn">Tutup</button>
        </div>
    </div>

    <main id="app" class="app-content">
        <div id="loading" class="loading-overlay hidden">
            <div class="loader-content">
                <div class="orbit-spinner"></div>
                <span>Memuat...</span>
            </div>
        </div>

        <div id="home-view">
            <div id="home-content"></div>
        </div>

        <div id="list-view" class="hidden">
            <div class="genre-grid">
                <button class="genre-pill" onclick="handleSearch('Action', true)">⚔️ Action</button>
                <button class="genre-pill" onclick="handleSearch('Isekai', true)">🌀 Isekai</button>
                <button class="genre-pill" onclick="handleSearch('Romance', true)">❤️ Romance</button>
            </div>
            <div id="list-results" class="result-grid"></div>
        </div>

        <div id="detail-view" class="hidden">
            <div class="nav-back">
                <button onclick="goHome()">⬅</button>
                <span>Detail Anime</span>
            </div>
            <div id="anime-info"></div>
            <div class="episode-grid" id="episode-grid"></div>
        </div>

        <div id="watch-view" class="hidden">
            <div class="nav-back">
                <button onclick="backToDetail()">⬅</button>
                <span id="video-title-top">Streaming</span>
            </div>

            <div class="video-container shadow-glow">
                <iframe id="video-player" src="" allowfullscreen></iframe>
            </div>

            <div class="watch-main-info">
                <h2 id="video-title">Memuat...</h2>
                <div id="server-options" class="server-list"></div>
            </div>

            <div class="watch-section">
                <div class="section-divider"><h3>EPISODE</h3></div>
                <div class="episode-numbers" id="watch-episode-list"></div>
            </div>

            <div class="watch-section">
                <div class="section-divider"><h3>DETAIL ANIME</h3></div>
                <div id="mini-detail-content" class="mini-detail-card"></div>
            </div>

            <div class="watch-section">
                <div class="section-divider"><h3>KOMENTAR</h3></div>
                <div class="comment-box-dummy">
                    <div class="user-info-mini">
                        <img src="https://e.top4top.io/p_369675i750.png" class="avatar-xs">
                        <span>User Member</span>
                    </div>
                    <textarea placeholder="Tulis komentarmu..." readonly></textarea>
                    <button class="btn-send-dummy">Kirim</button>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden">
            <div class="profile-card">
                <img src="https://e.top4top.io/p_369675i750.png" class="big-avatar">
                <h2>R_hmt ofc</h2>
                <button onclick="localStorage.clear(); location.reload()" class="btn-reset">Reset App</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="goHome()" id="nav-home">🏠<span>Home</span></div>
        <div class="nav-item-center"><button class="center-fab" onclick="toggleSearch()">🔍</button></div>
        <div class="nav-item" onclick="goProfile()" id="nav-profile">👤<span>Profil</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
