<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM STREAM | STEALTH BYPASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #10b981; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: scale(1.02); }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass sticky top-0 px-6 py-4 flex flex-col gap-4 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase">HM <span class="text-[#10b981]">Stream</span></h1>
            <div id="status" class="text-[8px] font-bold text-emerald-500 uppercase px-3 py-1 bg-emerald-500/10 rounded-full">Tunneling Active</div>
        </div>
        <input type="text" id="query" placeholder="Cari judul..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:border-[#10b981] outline-none">
    </nav>

    <main class="p-4 max-w-7xl mx-auto">
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div id="loader" class="text-center py-20 text-[10px] animate-pulse uppercase tracking-widest">Memecah Blokir...</div>
    </main>

    <div id="modal" class="fixed inset-0 hidden z-[99] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-4xl relative">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white/50 text-[10px] uppercase font-bold">Tutup <i class="fa-solid fa-xmark ml-1"></i></button>
            <div id="player" class="bg-black rounded-xl overflow-hidden shadow-2xl border border-white/5"></div>
        </div>
    </div>

    <script>
        const API_S1 = "https://consumet-api-production-e852.up.railway.app/anime/gogoanime";
        const API_S2 = "https://api.consumet.org/anime/gogoanime";

        async function sync() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // Mencoba beberapa endpoint sekaligus
            const sources = [API_S1 + "/recent-releases", API_S2 + "/recent-releases"];
            
            for (let src of sources) {
                try {
                    const r = await fetch(src);
                    const d = await r.json();
                    if (d.results) {
                        document.getElementById('loader').classList.add('hidden');
                        d.results.forEach(i => {
                            const div = document.createElement('div');
                            div.className = 'card cursor-pointer';
                            div.onclick = () => play(i.episodeId || i.id);
                            div.innerHTML = `
                                <img src="${i.image}" class="aspect-[3/4] object-cover w-full bg-zinc-900">
                                <div class="p-2 text-[10px] font-bold truncate uppercase">${i.title}</div>
                            `;
                            grid.appendChild(div);
                        });
                        return; // Berhenti jika satu berhasil
                    }
                } catch (e) { continue; }
            }
            document.getElementById('loader').innerText = "SEMUA JALUR MATI, TUAN 🗿";
        }

        async function play(id) {
            const m = document.getElementById('modal'), p = document.getElementById('player');
            m.classList.remove('hidden');
            p.innerHTML = `<div class="aspect-video flex items-center justify-center text-[10px] animate-pulse">BYPASSING...</div>`;
            try {
                const r = await fetch(`${API_S1}/watch/${id}`);
                const d = await r.json();
                p.innerHTML = `<iframe src="${d.headers?.Referer || d.sources[0].url}" allowfullscreen></iframe>`;
            } catch { p.innerHTML = `<div class="p-10 text-center uppercase text-[10px]">Gagal</div>`; }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('player').innerHTML = ''; }
        window.onload = sync;
    </script>
</body>
</html>
