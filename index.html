<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM STREAM | ADGUARD DNS BYPASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #10b981; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: scale(1.02); }
        .btn-genre { white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; font-size: 10px; }
        .btn-genre.active { background: var(--main); color: black; border-color: var(--main); font-weight: bold; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass sticky top-0 px-6 py-4 flex flex-col gap-4 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black italic">HM <span class="text-[#10b981]">STREAM</span></h1>
            <div id="status" class="text-[8px] font-bold text-gray-400 uppercase px-3 py-1 bg-white/5 rounded-full tracking-tighter">System: Ready</div>
        </div>
        <div class="relative">
            <input type="text" id="query" placeholder="Cari judul anime..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:border-[#10b981] outline-none">
        </div>
    </nav>

    <main class="p-4 max-w-7xl mx-auto">
        <div id="dns-alert" class="hidden mb-6 p-4 bg-emerald-950/30 border border-emerald-500/30 rounded-xl">
            <p class="text-[10px] text-emerald-400 font-bold uppercase mb-2"><i class="fa-solid fa-shield-halved mr-2"></i> Proteksi DNS Terdeteksi</p>
            <p class="text-[11px] text-gray-300 leading-relaxed">Tuan, aktifkan DNS Pribadi agar tembus: <br> 
            <span class="text-white font-mono bg-black/50 px-2 py-1 rounded inline-block mt-1 select-all">dns.adguard.com</span></p>
        </div>
        
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div id="loader" class="text-center py-20 text-[10px] uppercase animate-pulse">Menghubungkan...</div>
    </main>

    <div id="modal" class="fixed inset-0 hidden z-[99] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-4xl relative">
            <button onclick="closePlayer()" class="absolute -top-10 right-0 text-white/50 text-[10px] font-bold uppercase tracking-widest">Tutup <i class="fa-solid fa-xmark ml-1"></i></button>
            <div id="video-box" class="bg-black rounded-xl overflow-hidden shadow-2xl border border-white/5"></div>
        </div>
    </div>

    <script>
        const API = "https://consumet-api-production-e852.up.railway.app/anime/gogoanime";

        async function sync() {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loader');
            const alert = document.getElementById('dns-alert');
            
            try {
                const res = await fetch(`${API}/recent-releases`);
                const data = await res.json();
                
                loader.classList.add('hidden');
                alert.classList.add('hidden');
                
                data.results.forEach(i => {
                    const el = document.createElement('div');
                    el.className = 'card cursor-pointer';
                    el.onclick = () => play(i.episodeId || i.id);
                    el.innerHTML = `
                        <img src="${i.image}" class="aspect-[3/4] object-cover w-full bg-zinc-900">
                        <div class="p-2 text-[10px] font-bold truncate uppercase">${i.title}</div>
                    `;
                    grid.appendChild(el);
                });
            } catch (e) {
                loader.classList.add('hidden');
                alert.classList.remove('hidden');
                document.getElementById('status').innerText = "System: Blocked";
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500/50 uppercase text-[9px] font-bold tracking-widest">Gagal Tembus! Pakai DNS AdGuard, Tuan 🗿</div>';
            }
        }

        async function play(id) {
            const m = document.getElementById('modal'), v = document.getElementById('video-box');
            m.classList.remove('hidden');
            v.innerHTML = `<div class="aspect-video flex items-center justify-center text-[10px] animate-pulse">Memanggil Jalur...</div>`;
            try {
                const r = await fetch(`${API}/watch/${id}`);
                const d = await r.json();
                v.innerHTML = `<iframe src="${d.headers?.Referer || d.sources[0].url}" allowfullscreen></iframe>`;
            } catch (e) { v.innerHTML = `<div class="p-10 text-center uppercase text-[9px]">Gagal Memuat Video</div>`; }
        }

        function closePlayer() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('video-box').innerHTML = '';
        }

        window.onload = sync;
    </script>
</body>
</html>
