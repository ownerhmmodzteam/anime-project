<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V10</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            padding: 15px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 20px 0;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07);
            color: #fff;
            outline: none;
            backdrop-filter: blur(10px);
        }

        #player-section {
            display: none;
            margin-bottom: 30px;
            background: #0a0a0a;
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #1a1a1a;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: #0f0f0f;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: #333;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
        }

        .card-info h3 {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-head {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px 10px;
            font-size: 0.75rem;
        }

        .close-txt {
            color: #ff5f57;
            cursor: pointer;
            font-weight: 600;
        }

        .server-switcher {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .btn-s {
            background: #222;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>HM MODZ Stream</h1></header>

    <div id="player-section">
        <div class="player-head">
            <span id="playing-title" style="color: #888;"></span>
            <span class="close-txt" onclick="closePlayer()">TUTUP X</span>
        </div>
        <div class="video-wrapper">
            <iframe id="video-player" src="" allowfullscreen></iframe>
        </div>
        <div class="server-switcher">
            <button class="btn-s" onclick="switchServer(1)">Server 1</button>
            <button class="btn-s" onclick="switchServer(2)">Server 2</button>
            <button class="btn-s" onclick="switchServer(3)">Server 3</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="Cari anime, Tuan...">
    </div>

    <div id="anime-grid"></div>
</div>

<script>
    const grid = document.getElementById('anime-grid');
    const searchInput = document.getElementById('search');
    const playerSection = document.getElementById('player-section');
    const videoPlayer = document.getElementById('video-player');
    const playingTitle = document.getElementById('playing-title');
    let currentMalId = '';

    async function getAnime(query = '') {
        const url = query 
            ? `https://api.jikan.moe/v4/anime?q=${query}&limit=24` 
            : `https://api.jikan.moe/v4/top/anime?limit=24`;
        try {
            const res = await fetch(url);
            const json = await res.json();
            render(json.data);
        } catch (e) {}
    }

    function render(list) {
        grid.innerHTML = '';
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${item.images.webp.large_image_url}"><div class="card-info"><h3>${item.title}</h3></div>`;
            div.onclick = () => playAnime(item.title, item.mal_id);
            grid.appendChild(div);
        });
    }

    function playAnime(title, id) {
        currentMalId = id;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        playerSection.style.display = 'block';
        playingTitle.innerText = `Streaming: ${title}`;
        switchServer(1);
    }

    function switchServer(num) {
        const servers = {
            1: `https://vidsrc.xyz/embed/anime?mal=${currentMalId}`,
            2: `https://vidsrc.me/embed/anime?mal=${currentMalId}`,
            3: `https://anime.vidsrc.pro/embed/anime/${currentMalId}`
        };
        videoPlayer.src = servers[num];
    }

    function closePlayer() {
        playerSection.style.display = 'none';
        videoPlayer.src = '';
    }

    let timer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => getAnime(e.target.value), 700);
    });

    getAnime();
</script>
</body>
</html>
